name: ci

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check custom_components/

      - name: Run Ruff formatter check
        run: ruff format --check custom_components/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install homeassistant mypy

      - name: Run MyPy
        run: mypy custom_components/neuralwatt

  test:
    name: Test (HA ${{ matrix.home-assistant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        home-assistant:
          - "stable"
          - "dev"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Install Home Assistant stable
        if: matrix.home-assistant == 'stable'
        run: pip install homeassistant

      - name: Install Home Assistant dev
        if: matrix.home-assistant == 'dev'
        run: pip install --upgrade git+https://github.com/home-assistant/core.git@dev

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ \
            -v \
            --asyncio-mode=auto \
            --timeout=30 \
            --cov=custom_components/neuralwatt \
            --cov-report=xml \
            --cov-report=term-missing
